name: isagent publisher

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 7am UTC, Mon-Fri. 8AM Oslo time in winter, 9AM in summer.
  workflow_dispatch:       # allows manual trigger

jobs:
  spotlight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npx tsx scripts/isagent-publisher.ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: G01ABN2E885
